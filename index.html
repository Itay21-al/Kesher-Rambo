<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חפיפה מבצעית - RAMBO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Assistant', sans-serif;
            background-color: #020617;
            color: #e2e8f0;
            margin: 0;
            overflow-x: hidden;
        }

        .tactical-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(2, 6, 23, 0.94), rgba(2, 6, 23, 0.94)),
                linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            z-index: -1;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(59, 130, 246, 0.25);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
        }

        .mil-input {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(71, 85, 105, 0.5);
            color: #fff;
            outline: none;
            transition: all 0.2s;
            text-align: center;
        }

        .mil-input:focus {
            border-color: #3b82f6;
            background: rgba(30, 41, 59, 0.9);
        }

        .custom-checkbox {
            width: 28px;
            height: 28px;
            border: 2px solid #475569;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .checked .custom-checkbox {
            background-color: #2563eb;
            border-color: #3b82f6;
            box-shadow: 0 0 12px rgba(37, 99, 235, 0.6);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="tactical-bg"></div>

    <div class="max-w-xl mx-auto relative">
        
        <!-- Header Section - Centered without logo -->
        <div class="text-center mb-10 px-2">
            <h2 class="text-blue-500 font-black text-3xl tracking-widest uppercase">הפלוגה הייעודית</h2>
            <p class="text-white text-xl font-black italic tracking-[0.2em] mt-1 drop-shadow-[0_0_8px_rgba(255,255,255,0.2)]">RAMBO</p>
        </div>

        <div class="glass-card rounded-[2.5rem] overflow-hidden relative">
            <div class="bg-gradient-to-b from-blue-900/30 to-transparent p-6 border-b border-blue-500/20 text-center">
                <h1 class="text-xl font-bold text-white tracking-wide">דף חפיפה מבצעי - עמדת קשר</h1>
            </div>

            <!-- Fields -->
            <div class="p-6 space-y-8 border-b border-white/5">
                <div>
                    <label class="text-[10px] font-black text-blue-400 block mb-2 px-1 uppercase tracking-widest text-right">משימה / גזרה / אירוע</label>
                    <input type="text" id="missionName" class="mil-input w-full p-4 rounded-2xl font-black text-lg" placeholder="הזן נתוני משימה...">
                </div>

                <!-- Date & Time - Centered Layout -->
                <div class="flex flex-row justify-center items-end gap-6 w-full">
                    <div class="w-1/2 max-w-[180px]">
                        <label class="text-[10px] font-black text-blue-400 block mb-2 px-1 uppercase tracking-widest text-center">תאריך</label>
                        <input type="date" id="missionDate" class="mil-input w-full p-3 rounded-2xl text-sm font-bold">
                    </div>
                    <div class="w-1/3 max-w-[130px]">
                        <label class="text-[10px] font-black text-blue-400 block mb-2 px-1 uppercase tracking-widest text-center">שעה</label>
                        <input type="time" id="missionTime" class="mil-input w-full p-3 rounded-2xl text-sm font-bold">
                    </div>
                </div>
            </div>

            <!-- Checklist -->
            <div class="p-6">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-1.5 h-6 bg-blue-500 rounded-full shadow-[0_0_10px_#3b82f6]"></div>
                    <h3 class="text-lg font-black text-white uppercase tracking-tighter">ציר קשר ותקשורת</h3>
                </div>
                <div id="itemsList" class="space-y-3"></div>
            </div>

            <!-- Notes -->
            <div class="px-6 pb-6 text-right">
                <label class="text-[10px] font-black text-blue-400 block mb-2 px-1 uppercase tracking-widest">הערות ודגשים חריגים:</label>
                <textarea id="notes" class="mil-input w-full h-32 p-5 rounded-3xl text-sm font-medium outline-none resize-none text-right" placeholder="פרט כאן דגשים..."></textarea>
            </div>

            <!-- Signatures -->
            <div class="p-6 bg-black/40 flex flex-row gap-4 border-t border-white/10">
                <div class="flex-1">
                    <label class="text-[10px] font-bold text-slate-500 block mb-2 px-1 uppercase text-center">קשר יוצא</label>
                    <input type="text" id="outSign" class="mil-input w-full p-4 rounded-xl text-xs font-bold" placeholder="שם">
                </div>
                <div class="flex-1">
                    <label class="text-[10px] font-bold text-slate-500 block mb-2 px-1 uppercase text-center">קשר נכנס</label>
                    <input type="text" id="inSign" class="mil-input w-full p-4 rounded-xl text-xs font-bold" placeholder="שם">
                </div>
            </div>
        </div>

        <!-- Progress -->
        <div class="mt-10 mb-40 px-2">
            <div class="flex justify-between items-end mb-3">
                <span class="text-[10px] font-black text-blue-500 uppercase tracking-[0.3em]">Operational Readiness</span>
                <span id="pctText" class="text-3xl font-black text-white italic">0%</span>
            </div>
            <div class="w-full h-4 bg-slate-950 rounded-full border border-white/10 p-1">
                <div id="pctBar" class="h-full bg-blue-600 rounded-full transition-all duration-700 shadow-[0_0_15px_rgba(37,99,235,0.5)]" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <!-- WhatsApp Share -->
    <div class="fixed bottom-8 left-0 right-0 px-6 max-w-xl mx-auto z-50">
        <button onclick="sendReport()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-[1.8rem] font-black shadow-[0_15px_40px_rgba(0,0,0,0.8)] flex items-center justify-center gap-4 transition-all active:scale-95 border border-blue-400/20">
            <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.767 5.766 0 1.232.321 2.391.927 3.447l-1.174 4.301 4.391-1.153a5.728 5.728 0 002.623.637l.003-.001c3.181 0 5.767-2.586 5.767-5.766 0-3.18-2.586-5.766-5.77-5.766zm3.376 8.21c-.147.412-.751.751-1.047.807-.297.056-.677.084-1.107-.056-.264-.084-.587-.194-1.034-.383-1.89-.801-3.116-2.731-3.21-2.857-.095-.126-.771-.992-.771-1.986 0-.994.519-1.484.703-1.685.184-.201.405-.251.541-.251.135 0 .27 0 .387.006.12.006.279-.045.438.334.164.391.56 1.365.61 1.465.05.1.083.217.017.351-.066.134-.1.217-.2.334-.1.117-.211.263-.3.351-.1.1-.205.209-.089.409.116.2.514.851 1.103 1.375.758.675 1.397.883 1.597.983.2.1.317.084.436-.05.12-.134.514-.601.65-.802.135-.2.27-.167.456-.1.186.067 1.177.556 1.38.658.202.102.337.151.386.234.05.084.05.483-.1.895z"/></svg>
            <span class="text-xl">שדר דיווח RAMBO</span>
        </button>
    </div>

    <script>
        const tasks = [
            "הטענות : תקינות מכשירי ההטענה הרלוונטיים",
            "תדרים : וידוא תדר גזרתי, תדר פלוגתי ותדר מנמרים",
            "אנטנות : תקינות כבלים, חיבורים ואנטנות חיצוניות",
            "אנרגיה : מלאי סוללות טעונות ספייר למכשירי קשר",
            "דף קשר : אוקים מעודכנים ופקל״צ",
            "שמיעה : ביצוע בדיקת קשר מול החמ\"ל הרלוונטי"
        ];

        let state = tasks.map((t, i) => ({ id: i, text: t, checked: false }));

        function setup() {
            const d = new Date();
            document.getElementById('missionDate').value = d.toISOString().split('T')[0];
            document.getElementById('missionTime').value = d.toTimeString().slice(0,5);
            renderUI();
        }

        function renderUI() {
            const list = document.getElementById('itemsList');
            list.innerHTML = '';
            state.forEach(item => {
                const row = document.createElement('div');
                row.onclick = () => { item.checked = !item.checked; renderUI(); };
                row.className = `flex items-center gap-5 p-5 rounded-2xl border-2 transition-all cursor-pointer select-none ${
                    item.checked ? 'bg-blue-600/25 border-blue-500 shadow-[inset_0_0_15px_rgba(59,130,246,0.1)]' : 'bg-white/5 border-white/5 hover:bg-white/10'
                }`;
                row.innerHTML = `<div class="custom-checkbox ${item.checked ? 'checked' : ''}">${item.checked ? '<span class="text-white font-black">✓</span>' : ''}</div><span class="text-[16px] text-right ${item.checked ? 'text-white font-black' : 'text-slate-400 font-bold'}">${item.text}</span>`;
                list.appendChild(row);
            });
            const done = state.filter(s => s.checked).length;
            const pct = Math.round((done / state.length) * 100);
            document.getElementById('pctBar').style.width = pct + '%';
            document.getElementById('pctText').innerText = pct + '%';
        }

        function sendReport() {
            const mName = document.getElementById('missionName').value || "לא צוין";
            const mDate = document.getElementById('missionDate').value;
            const mTime = document.getElementById('missionTime').value;
            const mNotes = document.getElementById('notes').value || "אין";
            const sOut = document.getElementById('outSign').value || "---";
            const sIn = document.getElementById('inSign').value || "---";

            let summary = state.map(i => `${i.checked ? '✅' : '❌'} ${i.text}`).join('\n');
            
            const msg = `*--- דוח חפיפה מבצעי: RAMBO ---*\n📍 *משימה:* ${mName}\n⏰ *זמן:* ${mDate} | ${mTime}\n\n*סטטוס ציר קשר:*\n${summary}\n\n📝 *הערות:* ${mNotes}\n\n👤 *קשר יוצא:* ${sOut}\n👤 *קשר נכנס:* ${sIn}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        setup();
    </script>
</body>
</html>
